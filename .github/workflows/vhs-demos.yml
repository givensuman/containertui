name: Generate VHS Demos

on:
  push:
    branches: [main]
  workflow_dispatch: # Allow manual trigger

# Prevent multiple demo generations from running simultaneously
concurrency:
  group: vhs-demos
  cancel-in-progress: true

jobs:
  generate-gifs:
    runs-on: ubuntu-latest
    
    # Use Docker-in-Docker service for container management demos
    services:
      docker:
        image: docker:24-dind
        options: --privileged
        ports:
          - 2375:2375
        env:
          DOCKER_TLS_CERTDIR: ""
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Need full history for push
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      
      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      
      - name: Download Go dependencies
        run: go mod download
      
      - name: Install VHS
        run: |
          wget -q https://github.com/charmbracelet/vhs/releases/latest/download/vhs_$(uname -s)_$(uname -m).tar.gz
          tar -xzf vhs_*.tar.gz
          sudo mv vhs /usr/local/bin/
          vhs --version
      
      - name: Install ttyd (headless terminal)
        run: |
          sudo apt-get update
          sudo apt-get install -y ttyd
      
      # Configure Docker to use the DinD service
      - name: Configure Docker client
        run: |
          echo "DOCKER_HOST=tcp://localhost:2375" >> $GITHUB_ENV
          # Wait for Docker daemon to be ready
          timeout 30 sh -c 'until docker info > /dev/null 2>&1; do sleep 1; done'
          docker info
      
      - name: Set up Docker test environment
        run: |
          chmod +x ./demos/setup.sh
          ./demos/setup.sh
      
      - name: Generate demo GIFs
        run: |
          cd demos
          
          echo "Generating overview demo..."
          vhs overview.tape || echo "Warning: overview.tape failed"
          
          echo "Generating containers demo..."
          vhs containers.tape || echo "Warning: containers.tape failed"
          
          echo "Generating images demo..."
          vhs images.tape || echo "Warning: images.tape failed"
          
          echo "Generating volumes demo..."
          vhs volumes.tape || echo "Warning: volumes.tape failed"
          
          echo "Generating networks demo..."
          vhs networks.tape || echo "Warning: networks.tape failed"
          
          echo "Generating services demo..."
          vhs services.tape || echo "Warning: services.tape failed"
          
          cd ..
          
          echo ""
          echo "Generated GIFs:"
          ls -lh assets/demo-*.gif || echo "No GIFs generated"
      
      - name: Clean up Docker test environment
        if: always()
        run: |
          chmod +x ./demos/cleanup.sh
          ./demos/cleanup.sh || true
      
      - name: Check for changes
        id: check_changes
        run: |
          git add assets/*.gif
          if git diff --staged --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes to commit"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Changes detected"
          fi
      
      - name: Commit and push updated GIFs
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add assets/*.gif
          git commit -m "Update demo GIFs [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
