name: CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v4
        with:
          go-version: 1.25.4

      - uses: actions/cache@v3
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Check formatting
        run: |
          if [ -n "$(gofmt -s -l .)" ]; then
            echo "Go files not formatted:"
            gofmt -s -d .
            exit 1
          fi

      - name: Run tests
        run: go test -v -cover ./...

      - name: Build binary
        run: go build -o bin/containertui ./cmd

      - name: Verify binary works
        run: ./bin/containertui --help

      - name: Run GoReleaser snapshot build
        uses: goreleaser/goreleaser-action@v5
        with:
          version: latest
          args: release --snapshot --skip=publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify packages were generated
        run: |
          [ -d dist ] || (echo "dist directory not created"; exit 1)
          ls -lah dist/
