version: 2

project_name: containertui

before:
  hooks:
    - go mod tidy

builds:
  - id: default
    main: ./cmd
    binary: containertui
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
      - freebsd
    goarch:
      - amd64
      - arm
      - arm64
      - "386"
    ldflags:
      - -s -w
      - -X github.com/givensuman/containertui/internal/build.Version={{.Version}}
      - -X github.com/givensuman/containertui/internal/build.Commit={{.Commit}}
      - -X github.com/givensuman/containertui/internal/build.Date={{.Date}}

archives:
  - format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md

nfpms:
  - package_name: containertui
    file_name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    homepage: https://github.com/givensuman/containertui
    description: tui for managing container lifecycles
    maintainer: Given Suman <given@example.com>
    license: MIT
    formats:
      - deb
      - rpm
    bindir: /usr/local/bin
    contents:
      - src: LICENSE
        dst: /usr/share/doc/containertui/LICENSE
      - src: README.md
        dst: /usr/share/doc/containertui/README.md
    scripts:
      postinstall: scripts/postinstall.sh

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

release:
  github:
    owner: givensuman
    name: containertui
